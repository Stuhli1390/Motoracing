<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motoracing App Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root { --pro-red: #e74c3c; --dark-bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; --accent: #3498db; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark-bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: auto; }
        h1 { color: var(--pro-red); text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 2px solid var(--pro-red); padding-bottom: 10px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: var(--accent); font-size: 1.1em; }
        label { display: block; margin-top: 10px; font-size: 0.8em; color: #888; text-transform: uppercase; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Buttons für Reifendruck */
        .press-control { display: flex; align-items: center; justify-content: space-between; background: #333; border-radius: 8px; margin-top: 5px; padding: 5px; }
        .btn-press { width: 45px; height: 45px; background: var(--pro-red); border: none; border-radius: 6px; color: white; font-size: 1.5em; font-weight: bold; cursor: pointer; }
        .press-val { font-size: 1.2em; font-weight: bold; width: 60px; text-align: center; }
        
        .tyre-section { background: #252525; padding: 10px; border-radius: 8px; margin-top: 10px; border-top: 3px solid var(--pro-red); }
        button#saveBtn { width: 100%; padding: 15px; background: var(--pro-red); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* Layout & Leaderboard Box */
        .layout-preview { width: 100%; min-height: 200px; background: #000; border-radius: 8px; margin-top: 10px; display: flex; flex-direction: column; align-items: center; border: 1px solid #444; padding: 15px; box-sizing: border-box; }
        .layout-preview img { max-width: 80%; max-height: 120px; object-fit: contain; margin-bottom: 15px; }
        
        .lb-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .lb-table tr { border-top: 1px solid #222; }
        .lb-table td { padding: 5px 0; }
        .first-place { color: var(--gold); font-weight: bold; }

        .log-entry { border-left: 5px solid var(--gold); padding: 15px; margin-bottom: 15px; background: #252525; border-radius: 0 10px 10px 0; position: relative; }
        .driver-info { background: #2c3e50; color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        .admin-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-sec { background: #444; padding: 10px; font-size: 0.8em; margin: 0; border: none; color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Motoracing 🏁</h1>
    
    <div class="card">
        <h3>Session Details</h3>
        
        <div class="grid">
            <div>
                <label>Fahrer</label>
                <select id="driverSelect" onchange="handleDriverChange()">
                    <option value="">-- Wer fährt? --</option>
                    <option value="Stuhli">Stuhli</option>
                    <option value="Sulmi">Sulmi</option>
                    <option value="Dave">Dave</option>
                    <option value="Other">Anderer...</option>
                </select>
                <input type="text" id="manualDriver" style="display:none; margin-top:5px;" placeholder="Name eingeben">
            </div>
            <div>
                <label>Startnummer</label>
                <input type="text" id="raceNumber" placeholder="Nr.">
            </div>
        </div>

        <label>Strecke wählen</label>
        <select id="trackSelect" onchange="updateTrackPreview()">
            <option value="">-- Bitte wählen --</option>
            <option value="Pannonia Ring">Pannonia Ring (HU)</option>
            <option value="Slovakia Ring">Slovakia Ring (SK)</option>
            <option value="Brünn (Brno)">Brünn / Brno (CZ)</option>
            <option value="Grobnik (Rijeka)">Grobnik / Rijeka (HR)</option>
        </select>

        <div id="layoutBox" class="layout-preview">
            <img id="trackImage" style="display:none">
            <div id="trackLeaderboard" style="width:100%"></div>
            <span id="placeholderText" style="color:#444">Bitte Strecke wählen</span>
        </div>

        <div class="grid">
            <div>
                <label>Bestzeit (M:SS.ms)</label>
                <input type="text" id="laptime" placeholder="z.B. 2:05.40">
            </div>
            <div>
                <label>Asphalt °C</label>
                <input type="number" id="track_temp" placeholder="35">
            </div>
        </div>

        <div class="grid">
            <div class="tyre-section">
                <small style="font-weight:bold; color:var(--pro-red)">FRONT (bar)</small>
                <div class="press-control">
                    <button class="btn-press" onclick="changePress('press_f', -0.1)">-</button>
                    <span id="press_f" class="press-val">2.1</span>
                    <button class="btn-press" onclick="changePress('press_f', 0.1)">+</button>
                </div>
            </div>
            <div class="tyre-section">
                <small style="font-weight:bold; color:var(--pro-red)">REAR (bar)</small>
                <div class="press-control">
                    <button class="btn-press" onclick="changePress('press_r', -0.1)">-</button>
                    <span id="press_r" class="press-val">1.7</span>
                    <button class="btn-press" onclick="changePress('press_r', 0.1)">+</button>
                </div>
            </div>
        </div>
        
        <button id="saveBtn" onclick="saveRecord()">REKORD PRÜFEN & SPEICHERN</button>
    </div>

    <div class="admin-buttons">
        <button class="btn-sec" onclick="exportData()">Backup</button>
        <button class="btn-sec" onclick="document.getElementById('importFile').click()">Laden</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

    <h3 style="text-align:center; color:var(--gold)">Aktuelle Team-Rekorde</h3>
    <div id="logList"></div>
</div>

<script>
    const drivers = { "Stuhli": "85", "Sulmi": "63", "Dave": "69" };
    const tracks = {
        "Pannonia Ring": "pannonia.png",
        "Slovakia Ring": "slovakia.png",
        "Brünn (Brno)": "brno.png",
        "Grobnik (Rijeka)": "grobnik.png"
    };

    function handleDriverChange() {
        const sel = document.getElementById('driverSelect').value;
        const manual = document.getElementById('manualDriver');
        const num = document.getElementById('raceNumber');
        
        if (drivers[sel]) {
            num.value = drivers[sel];
            manual.style.display = 'none';
        } else if (sel === "Other") {
            manual.style.display = 'block';
            num.value = "";
        } else {
            manual.style.display = 'none';
            num.value = "";
        }
    }

    function changePress(id, d) {
        const el = document.getElementById(id);
        let val = (parseFloat(el.innerText) + d).toFixed(2);
        el.innerText = val > 0 ? val : 0.0;
    }

    function updateTrackPreview() {
        const track = document.getElementById('trackSelect').value;
        const img = document.getElementById('trackImage');
        const txt = document.getElementById('placeholderText');
        const lb = document.getElementById('trackLeaderboard');

        if (track) {
            img.src = tracks[track];
            img.style.display = 'block';
            txt.style.display = 'none';
            renderTrackLeaderboard(track);
        } else {
            img.style.display = 'none';
            txt.style.display = 'block';
            lb.innerHTML = "";
        }
    }

    function renderTrackLeaderboard(trackName) {
        const data = JSON.parse(localStorage.getItem('motoracing_best_v1')) || [];
        const filtered = data.filter(i => i.track === trackName).sort((a,b) => timeToSec(a.time) - timeToSec(b.time));
        const lb = document.getElementById('trackLeaderboard');
        
        if(filtered.length === 0) { lb.innerHTML = "<small style='color:#555'>Keine Rekorde</small>"; return; }
        
        let html = "<table class='lb-table'>";
        filtered.forEach((item, idx) => {
            html += `<tr class="${idx === 0 ? 'first-place' : ''}">
                <td>${idx+1}. ${item.driver} (#${item.nr})</td>
                <td style="text-align:right">${item.time}</td>
            </tr>`;
        });
        lb.innerHTML = html + "</table>";
    }

    function timeToSec(str) {
        const parts = str.replace(',', '.').split(':');
        return parts.length === 2 ? (parseFloat(parts[0]) * 60 + parseFloat(parts[1])) : parseFloat(parts[0]);
    }

    function saveRecord() {
        const selDriver = document.getElementById('driverSelect').value;
        const driver = selDriver === "Other" ? document.getElementById('manualDriver').value : selDriver;
        const track = document.getElementById('trackSelect').value;
        const time = document.getElementById('laptime').value;

        if(!driver || !track || !time) return alert("Fahrer, Strecke und Zeit fehlen!");

        let data = JSON.parse(localStorage.getItem('motoracing_best_v1')) || [];
        const existingIdx = data.findIndex(i => i.driver === driver && i.track === track);

        if (existingIdx !== -1) {
            if (timeToSec(time) >= timeToSec(data[existingIdx].time)) {
                return alert("Keine Verbesserung zu deinem Rekord (" + data[existingIdx].time + ")");
            }
            data.splice(existingIdx, 1);
        }

        const entry = {
            id: Date.now(),
            driver: driver,
            nr: document.getElementById('raceNumber').value,
            track: track,
            time: time,
            temp: document.getElementById('track_temp').value,
            pf: document.getElementById('press_f').innerText,
            pr: document.getElementById('press_r').innerText,
            date: new Date().toLocaleDateString('de-DE')
        };

        data.push(entry);
        localStorage.setItem('motoracing_best_v1', JSON.stringify(data));
        refreshAll();
        alert("Rekord gespeichert!");
    }

    function refreshAll() {
        const data = JSON.parse(localStorage.getItem('motoracing_best_v1')) || [];
        const list = document.getElementById('logList');
        data.sort((a,b) => a.track.localeCompare(b.track));
        
        list.innerHTML = data.map(i => `
            <div class="log-entry">
                <div class="driver-info">👤 ${i.driver} | #${i.nr}</div>
                <div style="font-weight:bold; color:var(--pro-red);">${i.track}: ${i.time}</div>
                <div style="font-size:0.8em; color:#888; margin-top:5px;">
                    ${i.date} | Asphalt: ${i.temp}°C | F: ${i.pf} / R: ${i.pr} bar
                </div>
                <button class="btn-sec" style="margin-top:10px; background:#333" onclick="deleteEntry(${i.id})">Löschen</button>
            </div>
        `).join('');
        
        updateTrackPreview();
    }

    function deleteEntry(id) {
        if(!confirm("Rekord löschen?")) return;
        let data = JSON.parse(localStorage.getItem('motoracing_best_v1')) || [];
        data = data.filter(i => i.id !== id);
        localStorage.setItem('motoracing_best_v1', JSON.stringify(data));
        refreshAll();
    }

    function exportData() {
        const data = localStorage.getItem('motoracing_best_v1');
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'motoracing_records.json';
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            localStorage.setItem('motoracing_best_v1', event.target.result);
            refreshAll();
        };
        reader.readAsText(e.target.files[0]);
    }

    refreshAll();
</script>

</body>
</html>
